app = "lila-tictactoe"
primary_region = "sin"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  NAKAMA_HTTP_KEY = "defaultkey"

[http_service]
  internal_port = 7350
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "60s"
    method = "GET"
    path = "/healthcheck"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
